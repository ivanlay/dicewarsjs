<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="description" content="Dice Wars - A strategic dice game" />
    <title>DICEWARS</title>

    <!-- Resource hints for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://code.createjs.com" />

    <!-- Preload critical assets -->
    <link rel="preload" href="assets/sounds/button.wav" as="audio" />
    <link rel="preload" href="assets/sounds/click.wav" as="audio" />
    <link rel="preload" href="<%= createJsScript %>" as="script" />
    <link rel="preload" href="<%= gameLoaderScript %>" as="script" />
    <link rel="preload" href="main.bundle.js" as="script" />

    <!-- Favicon -->
    <link rel="apple-touch-icon-precomposed" href="https://www.gamedesign.jp/img/icon.png" />
    <link rel="shortcut icon" href="https://www.gamedesign.jp/img/favicon.ico" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css?family=Anton|Roboto&display=swap"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Styles -->
    <style>
      body {
        background: #eeeeee;
        margin: 0;
        padding: 0;
        text-align: center;
      }

      canvas {
        background-color: #ffffff;
        display: block;
        margin: auto;
      }

      a:link,
      a:visited {
        color: #aaaaaa;
        text-decoration: none;
      }

      /* Loading indicator styles */
      .sound-loading-indicator {
        position: absolute;
        bottom: 10px;
        right: 10px;
        background-color: rgba(0, 0, 0, 0.5);
        color: white;
        padding: 5px 10px;
        border-radius: 3px;
        font-size: 12px;
        font-family: 'Roboto', sans-serif;
        z-index: 1000;
      }
    </style>

    <!-- Scripts - Controlled loading order is critical -->
    <!-- 1. First load CreateJS -->
    <script src="<%= createJsScript %>"></script>
    
    <!-- 2. Then load game-loader.js which sets up global objects -->
    <script type="text/javascript" src="<%= gameLoaderScript %>"></script>
    
    <!-- 3. Load library scripts -->
    <script type="text/javascript" src="<%= areadiceScript %>"></script>
    <script type="text/javascript" src="<%= mcScript %>"></script>
    
    <!-- 4. Webpack runtime chunk for better caching -->
    <script type="text/javascript" src="runtime.bundle.js"></script>
    
    <!-- 5. Webpack main bundle with ES6 modules -->
    <script type="text/javascript" src="main.bundle.js"></script>
  </head>

  <body>
    <canvas id="myCanvas"></canvas>
    <!-- 6. Finally load the main.js script that initializes the game -->
    <script type="text/javascript" src="main.js"></script>
    
    <!-- Debug only: display loader and initialization status -->
    <script>
      // Log initialization steps to help with troubleshooting
      console.log('DiceWarsJS Initialization Status:');
      console.log('- CreateJS loaded:', typeof createjs !== 'undefined');
      console.log('- Game constructor available:', typeof window.Game === 'function');
      console.log('- Game-loader initialized:', window.DiceWars?.initialized === true);
      
      // Add on-error handler to show issues
      window.addEventListener('error', function(e) {
        console.error('Script error detected:', e.message);
      });
    </script>
  </body>
</html>
